name: Upload Preview APK

on:
  pull_request:
  workflow_dispatch:
    inputs:
      abi_filter:
        description: 'ABI Filter'
        required: false
        default: 'armeabi-v7a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86
          - x86_64

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Upload Preview APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - uses: android-actions/setup-android@v3
      
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Setup Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jni/nexuschat-core-rust

      - name: Get core hash
        id: core-hash
        run: |
          cd jni/nexuschat-core-rust
          echo "hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          cd -

      - name: Restore compiled core
        id: core-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            jni/arm64-v8a
            libs/arm64-v8a
          key: core-arm64-v8a-${{ steps.core-hash.outputs.hash }}-ndk-r26d

      - name: Compile core
        if: steps.core-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x scripts/install-toolchains.sh
          chmod +x scripts/ndk-make.sh
          export PATH="${PATH}:${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/"
          ./scripts/install-toolchains.sh
          ./scripts/ndk-make.sh arm64-v8a

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon -PABI_FILTER=${{ github.event.inputs.abi_filter || 'arm64-v8a' }} assembleGplayDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-preview.apk
          path: 'build/outputs/apk/gplay/debug/*.apk'